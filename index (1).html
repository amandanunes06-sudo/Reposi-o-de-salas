<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Reposição de Salas — Hemoaraucária</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F5F5F5;color:#1a1a1a}
.app{max-width:480px;margin:0 auto;padding:0 0 90px;min-height:100vh}
/* HEADER */
.header{background:#fff;border-bottom:1px solid #e8e8e8;padding:14px 16px;position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:16px;font-weight:600;color:#1a1a1a}
.header p{font-size:11px;color:#888;margin-top:2px}
.sala-toggle{display:flex;gap:4px;background:#f0f0f0;border-radius:8px;padding:3px}
.sala-btn{padding:5px 12px;font-size:12px;border-radius:6px;cursor:pointer;border:none;background:none;color:#666;font-weight:500;transition:all .15s}
.sala-btn.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.12);font-weight:600}
/* TABS */
.tabs{display:flex;background:#fff;border-bottom:1px solid #e8e8e8}
.tab{flex:1;text-align:center;padding:11px 4px;font-size:13px;color:#888;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:#1a1a1a;border-bottom:2px solid #1a73e8;font-weight:600}
/* SEARCH */
.search-bar{padding:10px 16px 6px;background:#fff;border-bottom:1px solid #e8e8e8}
.search-bar input{width:100%;padding:9px 13px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;background:#f9f9f9;color:#1a1a1a;outline:none}
.search-bar input:focus{border-color:#1a73e8;background:#fff}
/* CARDS */
.section{padding:10px 16px}
.sup-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sup-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.sup-head:active{background:#f9f9f9}
.sup-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sup-name{font-size:13px;font-weight:600;color:#1a1a1a}
.sup-meta{font-size:11px;color:#888;margin-top:2px}
.chev{font-size:18px;color:#aaa;transition:transform .2s;margin-left:auto;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.items{border-top:1px solid #f0f0f0}
.group-label{font-size:10px;font-weight:700;color:#999;background:#f8f8f8;padding:5px 14px;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid #f0f0f0}
.item{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid #f5f5f5}
.item:last-child{border-bottom:none}
.item-name{flex:1;font-size:12px;color:#222;line-height:1.4}
.qty-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qb{width:28px;height:28px;border:1px solid #ddd;border-radius:7px;background:#f5f5f5;color:#333;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:500;-webkit-tap-highlight-color:transparent}
.qb:active{background:#e0e0e0}
.qv{font-size:14px;font-weight:600;min-width:24px;text-align:center;color:#1a1a1a}
.qv.has{color:#1a73e8}
.badge{background:#e8f0fe;color:#1a73e8;font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;margin-left:4px}
/* FAB */
.fab{position:fixed;bottom:20px;right:20px;background:#1a73e8;color:#fff;border:none;border-radius:24px;padding:13px 20px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;z-index:20;box-shadow:0 4px 14px rgba(26,115,232,.4);-webkit-tap-highlight-color:transparent}
.fab:active{transform:scale(.97)}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30;display:flex;align-items:flex-end}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px 16px 32px}
.modal-drag{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:3px}
.modal-sub{font-size:12px;color:#888;margin-bottom:16px}
.msec{margin-bottom:14px}
.msec-title{font-size:11px;font-weight:700;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;padding-bottom:4px;border-bottom:1px solid #f0f0f0}
.mitem{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;color:#333;gap:8px}
.mitem span:last-child{font-weight:600;flex-shrink:0;color:#1a1a1a}
.email-section{background:#f0f6ff;border:1px solid #c5d9f8;border-radius:10px;padding:14px;margin:16px 0 8px}
.email-section label{font-size:12px;font-weight:600;color:#1a73e8;display:block;margin-bottom:6px}
.email-input{width:100%;padding:9px 12px;border:1px solid #c5d9f8;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;outline:none}
.email-note{font-size:11px;color:#888;margin-top:6px}
.mactions{display:flex;gap:10px;margin-top:14px}
.btn-cancel{flex:1;padding:12px;border:1px solid #e0e0e0;border-radius:10px;background:#fff;font-size:14px;cursor:pointer;color:#555;font-weight:500}
.btn-ok{flex:2;padding:12px;border:none;border-radius:10px;background:#1a73e8;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.btn-ok:active{background:#1557b0}
/* HISTÓRICO */
.hist-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;margin-bottom:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.hist-date{font-size:13px;font-weight:600;color:#1a1a1a}
.hist-tags{display:flex;gap:6px;flex-wrap:wrap}
.hist-sala{font-size:11px;padding:3px 9px;border-radius:20px;background:#e8f0fe;color:#1a73e8;font-weight:600}
.hist-status{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;cursor:pointer}
.hist-status.pendente{background:#FFF3E0;color:#E65100}
.hist-status.andamento{background:#E3F2FD;color:#1565C0}
.hist-status.atendido{background:#E8F5E9;color:#2E7D32}
.hist-items{font-size:11px;color:#666;line-height:1.8}
.hist-sup{font-size:12px;font-weight:600;color:#1a1a1a;margin-top:7px;margin-bottom:2px}
/* LOGIN */
.login-screen{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:100}
.login-logo{font-size:48px;margin-bottom:16px}
.login-title{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
.login-sub{font-size:13px;color:#888;margin-bottom:32px;text-align:center}
.login-input{width:100%;padding:13px 16px;border:1px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;margin-bottom:12px;background:#f9f9f9}
.login-input:focus{border-color:#1a73e8;background:#fff}
.login-btn{width:100%;padding:14px;background:#1a73e8;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.login-btn:active{background:#1557b0}
.login-err{color:#c62828;font-size:13px;margin-top:8px;text-align:center}
.login-back{color:#1a73e8;font-size:13px;margin-top:16px;cursor:pointer;text-decoration:underline}
/* PAINEL */
.painel-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;margin-bottom:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.painel-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
.painel-info h3{font-size:13px;font-weight:600;color:#1a1a1a}
.painel-info p{font-size:11px;color:#888;margin-top:2px}
.status-select{font-size:12px;padding:5px 10px;border-radius:20px;border:none;font-weight:600;cursor:pointer;outline:none}
.status-pendente{background:#FFF3E0;color:#E65100}
.status-andamento{background:#E3F2FD;color:#1565C0}
.status-atendido{background:#E8F5E9;color:#2E7D32}
.painel-items{font-size:11px;color:#555;line-height:1.9;border-top:1px solid #f5f5f5;padding-top:10px}
.painel-sup{font-size:12px;font-weight:700;color:#1a1a1a;margin-top:8px;margin-bottom:2px}
.painel-email{font-size:11px;color:#888;margin-top:6px}
.filter-bar{display:flex;gap:8px;padding:10px 16px 4px;background:#fff;border-bottom:1px solid #e8e8e8;overflow-x:auto}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #e0e0e0;background:#fff;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;color:#555}
.filter-btn.active{background:#1a73e8;color:#fff;border-color:#1a73e8}
/* TOAST */
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:50;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1}
.empty{text-align:center;padding:40px 20px;color:#aaa;font-size:14px}
.spinner{text-align:center;padding:40px;color:#888;font-size:13px}
</style>
</head>

<!-- LOGIN PAINEL -->
<div class="login-screen" id="login-screen" style="display:none">
  <div class="login-logo">🏥</div>
  <div class="login-title">Painel de Gestão</div>
  <div class="login-sub">Hemoaraucária — Reposição de Salas</div>
  <input class="login-input" type="email" id="login-email" placeholder="Seu e-mail" autocomplete="email">
  <input class="login-input" type="password" id="login-senha" placeholder="Senha" autocomplete="current-password">
  <button class="login-btn" onclick="fazerLogin()">Entrar no Painel</button>
  <div class="login-err" id="login-err"></div>
  <span class="login-back" onclick="voltarPedido()">← Voltar para fazer pedido</span>
</div>

<!-- APP PRINCIPAL -->
<div class="app" id="main-app">
<div class="header">
  <div class="header-row">
    <div>
      <h1>🏥 Reposição de Salas</h1>
      <p id="hdr-sub">Selecione os materiais e envie o pedido</p>
    </div>
    <div class="sala-toggle">
      <button class="sala-btn active" onclick="setSala('SALA 01')" id="btn-s1">Sala 01</button>
      <button class="sala-btn" onclick="setSala('SALA 02')" id="btn-s2">Sala 02</button>
    </div>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('pedido')" id="tab-p">Novo Pedido</div>
  <div class="tab" onclick="switchTab('hist')" id="tab-h">Meus Pedidos <span class="badge" id="hbadge">0</span></div>
  <div class="tab" onclick="abrirPainel()" id="tab-g">⚙️ Gestão</div>
</div>

<!-- PEDIDO -->
<div id="view-p">
  <div class="search-bar"><input type="text" placeholder="🔍 Buscar material..." oninput="filterItems(this.value)" id="srch"></div>
  <div class="section" id="sup-list"></div>
</div>

<!-- HISTÓRICO LOCAL -->
<div id="view-h" style="display:none">
  <div class="section" id="hist-list"></div>
</div>

<!-- PAINEL GESTÃO -->
<div id="view-g" style="display:none">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setPainelFiltro('todos')" id="f-todos">Todos</button>
    <button class="filter-btn" onclick="setPainelFiltro('pendente')" id="f-pendente">⏳ Pendentes</button>
    <button class="filter-btn" onclick="setPainelFiltro('andamento')" id="f-andamento">🔄 Em andamento</button>
    <button class="filter-btn" onclick="setPainelFiltro('atendido')" id="f-atendido">✅ Atendidos</button>
  </div>
  <div class="section" id="painel-list"></div>
  <div style="text-align:center;padding:10px">
    <button onclick="logoutPainel()" style="background:none;border:1px solid #ddd;border-radius:8px;padding:8px 18px;font-size:12px;color:#888;cursor:pointer">Sair do painel</button>
  </div>
</div>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()" id="fab" style="display:none">
  🛒 Ver Pedido &nbsp;<span id="fab-n" style="background:rgba(255,255,255,.3);padding:2px 8px;border-radius:20px;font-size:12px">0</span>
</button>

<!-- MODAL CONFIRMAÇÃO -->
<div class="modal-bg" id="modal" style="display:none" onclick="closeBg(event)">
<div class="modal">
  <div class="modal-drag"></div>
  <div class="modal-title">Confirmar Pedido</div>
  <div class="modal-sub" id="m-sub"></div>
  <div id="m-content"></div>
  <div class="email-section">
    <label>📧 Enviar cópia por e-mail (opcional)</label>
    <input type="email" class="email-input" id="email-to" placeholder="seuemail@hospital.com.br">
    <div class="email-note">O pedido será salvo automaticamente no painel de gestão e também enviado por e-mail se informado.</div>
  </div>
  <div class="mactions">
    <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
    <button class="btn-ok" onclick="confirmOrder()">✈️ Enviar Pedido</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

// Estado
let quantities={}, openSup={}, histLocal=[], sala='SALA 01', filter='';
let painelFiltro='todos', todosPedidos={}, usuarioLogado=null;
SUPPLIERS.forEach(s=>openSup[s.id]=false);

function salvarLocal(){try{localStorage.setItem('hemo_qty',JSON.stringify(quantities));}catch(e){}}
function salvarHistLocal(){try{localStorage.setItem('hemo_hist',JSON.stringify(histLocal));}catch(e){}}
function carregarLocal(){
  try{const r=localStorage.getItem('hemo_qty');if(r)quantities=JSON.parse(r);}catch(e){}
  try{const r=localStorage.getItem('hemo_hist');if(r)histLocal=JSON.parse(r);}catch(e){}
}

function key(sid,item){return sid+'||'+item;}
function getQ(sid,item){return quantities[key(sid,item)]||0;}
function totalItems(){return Object.values(quantities).reduce((a,b)=>a+b,0);}

window.setSala=function(s){
  sala=s;
  document.getElementById('btn-s1').className='sala-btn'+(s==='SALA 01'?' active':'');
  document.getElementById('btn-s2').className='sala-btn'+(s==='SALA 02'?' active':'');
  renderSuppliers();
};

window.filterItems=function(v){filter=v.toLowerCase();renderSuppliers();};

function render(){renderSuppliers();renderHistLocal();updateFab();}

function renderSuppliers(){
  const c=document.getElementById('sup-list');
  let html='';
  SUPPLIERS.forEach(s=>{
    let allItems=[];
    Object.entries(s.groups).forEach(([g,items])=>allItems=allItems.concat(items));
    const filtered=filter?allItems.filter(i=>i.toLowerCase().includes(filter)):allItems;
    if(!filtered.length)return;
    const supQty=allItems.reduce((a,i)=>a+getQ(s.id,i),0);
    const isOpen=openSup[s.id];
    html+=`<div class="sup-card"><div class="sup-head" onclick="toggleSup('${s.id}')">
      <div class="sup-icon" style="background:${s.color}">${s.emoji}</div>
      <div style="flex:1">
        <div class="sup-name">${s.name}</div>
        <div class="sup-meta">${allItems.length} itens${supQty>0?` · <strong style="color:${s.tc}">${supQty} no pedido</strong>`:''}</div>
      </div>
      <span class="chev${isOpen?' open':''}">⌄</span>
    </div>`;
    if(isOpen){
      html+='<div class="items">';
      Object.entries(s.groups).forEach(([g,items])=>{
        const show=filter?items.filter(i=>i.toLowerCase().includes(filter)):items;
        if(!show.length)return;
        html+=`<div class="group-label">${g}</div>`;
        show.forEach(item=>{
          const q=getQ(s.id,item);
          const esc=item.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          html+=`<div class="item">
            <div class="item-name">${item}</div>
            <div class="qty-ctrl">
              <button class="qb" onclick="chg('${s.id}','${esc}',-1)">−</button>
              <div class="qv${q>0?' has':''}" id="qv-${s.id}-${Math.abs(hashStr(item))}">${q}</div>
              <button class="qb" onclick="chg('${s.id}','${esc}',1)">+</button>
            </div>
          </div>`;
        });
      });
      html+='</div>';
    }
    html+='</div>';
  });
  if(!html)html='<div class="empty">Nenhum item encontrado</div>';
  c.innerHTML=html;
}

function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=Math.imul(31,h)+s.charCodeAt(i)|0;return h;}

window.toggleSup=function(id){openSup[id]=!openSup[id];renderSuppliers();};

window.chg=function(sid,item,d){
  const k=key(sid,item);
  quantities[k]=Math.max(0,(quantities[k]||0)+d);
  renderSuppliers();updateFab();salvarLocal();
};

function updateFab(){
  const t=totalItems();
  document.getElementById('fab').style.display=t>0?'flex':'none';
  document.getElementById('fab-n').textContent=t;
}

window.openModal=function(){
  const now=new Date();
  document.getElementById('m-sub').textContent=sala+' · '+now.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let html='';
  SUPPLIERS.forEach(s=>{
    let allItems=[];Object.entries(s.groups).forEach(([g,items])=>allItems=allItems.concat(items));
    const sel=allItems.filter(i=>getQ(s.id,i)>0);
    if(!sel.length)return;
    html+=`<div class="msec"><div class="msec-title">${s.emoji} ${s.name}</div>`;
    sel.forEach(i=>html+=`<div class="mitem"><span>${i}</span><span>${getQ(s.id,i)} un</span></div>`);
    html+='</div>';
  });
  document.getElementById('m-content').innerHTML=html;
  document.getElementById('modal').style.display='flex';
};

window.closeModal=function(){document.getElementById('modal').style.display='none';};
window.closeBg=function(e){if(e.target.id==='modal')closeModal();};

function buildEmailBody(){
  const now=new Date();
  let body='PEDIDO DE REPOSIÇÃO — '+sala+'\n';
  body+='Data: '+now.toLocaleDateString('pt-BR')+' às '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+'\n\n';
  SUPPLIERS.forEach(s=>{
    let allItems=[];Object.entries(s.groups).forEach(([g,items])=>allItems=allItems.concat(items));
    const sel=allItems.filter(i=>getQ(s.id,i)>0);
    if(!sel.length)return;
    body+='\n[ '+s.name+' ]\n';
    sel.forEach(i=>body+='  • '+i+': '+getQ(s.id,i)+' un\n');
  });
  body+='\nTotal: '+totalItems()+' item(ns)';
  return body;
}

window.confirmOrder=async function(){
  const emailTo=document.getElementById('email-to').value.trim();
  const now=new Date();
  const bySup={};let total=0;
  SUPPLIERS.forEach(s=>{
    let allItems=[];Object.entries(s.groups).forEach(([g,items])=>allItems=allItems.concat(items));
    const sel=allItems.filter(i=>getQ(s.id,i)>0).map(i=>({name:i,qty:getQ(s.id,i)}));
    if(sel.length){bySup[s.name]=sel;total+=sel.reduce((a,x)=>a+x.qty,0);}
  });
  const pedido={
    sala,
    data:now.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    timestamp:now.getTime(),
    bySup,total,
    emailSolicitante:emailTo||'',
    status:'pendente'
  };
  // Salvar no Firebase
  try{
    await push(ref(db,'pedidos'),pedido);
  }catch(e){console.error('Firebase error:',e);}
  // Histórico local
  histLocal.push(pedido);
  // Email
  if(emailTo){
    const subject=encodeURIComponent('Pedido Reposição — '+sala+' — '+now.toLocaleDateString('pt-BR'));
    const body=encodeURIComponent(buildEmailBody());
    window.location.href='mailto:'+emailTo+'?subject='+subject+'&body='+body;
  }
  quantities={};salvarLocal();salvarHistLocal();
  closeModal();
  showToast('✅ Pedido enviado ao painel de gestão!');
  render();
};

function renderHistLocal(){
  const c=document.getElementById('hist-list');
  document.getElementById('hbadge').textContent=histLocal.length;
  if(!histLocal.length){c.innerHTML='<div class="empty">📋 Nenhum pedido feito ainda</div>';return;}
  let html='';
  [...histLocal].reverse().forEach(o=>{
    html+=`<div class="hist-card">
      <div class="hist-top">
        <span class="hist-date">📅 ${o.data}</span>
        <div class="hist-tags"><span class="hist-sala">${o.sala}</span><span class="hist-status ${o.status||'pendente'}">${labelStatus(o.status||'pendente')}</span></div>
      </div>`;
    Object.entries(o.bySup).forEach(([sup,items])=>{
      html+=`<div class="hist-sup">${sup}</div>`;
      html+=`<div class="hist-items">${items.map(i=>'• '+i.qty+'× '+i.name).join('<br>')}</div>`;
    });
    html+=`<div style="font-size:11px;color:#aaa;margin-top:6px">${o.total} item(ns)</div></div>`;
  });
  c.innerHTML=html;
}

function labelStatus(s){return s==='pendente'?'⏳ Pendente':s==='andamento'?'🔄 Em andamento':'✅ Atendido';}

window.switchTab=function(t){
  document.getElementById('view-p').style.display=t==='pedido'?'':'none';
  document.getElementById('view-h').style.display=t==='hist'?'':'none';
  document.getElementById('view-g').style.display=t==='gestao'?'':'none';
  document.getElementById('tab-p').className='tab'+(t==='pedido'?' active':'');
  document.getElementById('tab-h').className='tab'+(t==='hist'?' active':'');
  document.getElementById('tab-g').className='tab'+(t==='gestao'?' active':'');
  if(t==='hist')renderHistLocal();
  if(t==='gestao')renderPainel();
};

// ── PAINEL DE GESTÃO ──
window.abrirPainel=function(){
  if(usuarioLogado){
    switchTab('gestao');
  } else {
    document.getElementById('login-screen').style.display='flex';
  }
};

window.voltarPedido=function(){
  document.getElementById('login-screen').style.display='none';
};

window.fazerLogin=async function(){
  const email=document.getElementById('login-email').value.trim();
  const senha=document.getElementById('login-senha').value;
  document.getElementById('login-err').textContent='';
  try{
    await signInWithEmailAndPassword(auth,email,senha);
  }catch(e){
    document.getElementById('login-err').textContent='E-mail ou senha incorretos.';
  }
};

window.logoutPainel=async function(){
  await signOut(auth);
  usuarioLogado=null;
  switchTab('pedido');
};

onAuthStateChanged(auth,user=>{
  if(user){
    usuarioLogado=user;
    document.getElementById('login-screen').style.display='none';
    switchTab('gestao');
    carregarPedidosFirebase();
  }
});

function carregarPedidosFirebase(){
  onValue(ref(db,'pedidos'),snap=>{
    todosPedidos={};
    snap.forEach(child=>{todosPedidos[child.key]=child.val();});
    renderPainel();
  });
}

window.setPainelFiltro=function(f){
  painelFiltro=f;
  ['todos','pendente','andamento','atendido'].forEach(x=>{
    document.getElementById('f-'+x).className='filter-btn'+(f===x?' active':'');
  });
  renderPainel();
};

function renderPainel(){
  const c=document.getElementById('painel-list');
  const lista=Object.entries(todosPedidos).sort((a,b)=>b[1].timestamp-a[1].timestamp);
  const filtrados=painelFiltro==='todos'?lista:lista.filter(([k,v])=>v.status===painelFiltro);
  if(!filtrados.length){c.innerHTML='<div class="empty">Nenhum pedido aqui</div>';return;}
  let html='';
  filtrados.forEach(([id,p])=>{
    const st=p.status||'pendente';
    html+=`<div class="painel-card">
      <div class="painel-top">
        <div class="painel-info">
          <h3>📅 ${p.data}</h3>
          <p>${p.sala} · ${p.total} item(ns)</p>
        </div>
        <select class="status-select status-${st}" onchange="mudarStatus('${id}',this.value)">
          <option value="pendente" ${st==='pendente'?'selected':''}>⏳ Pendente</option>
          <option value="andamento" ${st==='andamento'?'selected':''}>🔄 Em andamento</option>
          <option value="atendido" ${st==='atendido'?'selected':''}>✅ Atendido</option>
        </select>
      </div>
      <div class="painel-items">`;
    Object.entries(p.bySup).forEach(([sup,items])=>{
      html+=`<div class="painel-sup">${sup}</div>`;
      html+=items.map(i=>`• ${i.qty}× ${i.name}`).join('<br>');
    });
    if(p.emailSolicitante)html+=`<div class="painel-email">📧 ${p.emailSolicitante}</div>`;
    html+=`</div></div>`;
  });
  c.innerHTML=html;
}

window.mudarStatus=async function(id,novoStatus){
  try{
    await update(ref(db,`pedidos/${id}`),{status:novoStatus});
    showToast('Status atualizado!');
  }catch(e){showToast('Erro ao atualizar.');}
};

function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// INIT
carregarLocal();
render();
</script>
</body>
</html>
